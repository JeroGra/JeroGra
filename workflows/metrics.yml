name: Metrics
on:
  # Se actualiza cada 24 horas
  schedule: [{cron: "0 0 * * *"}]
  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  # Se ejecuta cada vez que haces un push a la rama principal
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Tu token guardado en Secrets
          token: ${{ secrets.METRICS_TOKEN }}

          # Configuración de la imagen
          user: JeroGra
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires
          
          # LENGUAJES (Aquí configuramos lo que pediste)
          plugin_languages: yes
          plugin_languages_ignored: html, css  # Opcional: ignorar lenguajes menores
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
